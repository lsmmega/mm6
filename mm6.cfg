MEMORY {
	ROMH:    start = $0,    size = $10,   fill = yes;
	ROMG00:  start = $0,    size = $10000;
	ROMG01:  start = $0,    size = $6000;
	ROMU:    start = $0,    size = $A000;
	ROMG02:  start = $0,    size = $10000;
	ROMG03:  start = $0,    size = $10000;
	ROMD00:  start = $0,    size = $C000;
	ROMSM00: start = $0,    size = $2000;
	ROMSM01: start = $0,    size = $2000;
	ROMM00:  start = $8000, size = $2000;
	ROMM01:  start = $8000, size = $2000;
	ROMC00:  start = $0,    size = $1B00;
	ROMD01:  start = $0,    size = $500;
	ROMC01:  start = $0,    size = $1200;
	ROMD02:  start = $0,    size = $E00;
	ROMC02:  start = $0,    size = $1B00;
	ROMD03:  start = $0,    size = $500;
	ROMC03:  start = $0,    size = $1B00;
	ROMD04:  start = $0,    size = $E00;
	ROMC04:  start = $0,    size = $1B00;
	ROMD05:  start = $0,    size = $500;
	ROMC05:  start = $0,    size = $1B00;
	ROMD06:  start = $0,    size = $500;
	ROMM02:  start = $8000, size = $2000;
	ROMM03:  start = $8000, size = $2000;
	ROMSM02: start = $0,    size = $2000;
	ROMSM03: start = $0,    size = $2000;
	ROMA:    start = $8000, size = $6000;
	ROMD07:  start = $0,    size = $4000;
	ROMM04:  start = $8000, size = $2000;
	ROMM05:  start = $8000, size = $2000;
	ROMM06:  start = $8000, size = $2000;
	ROMM07:  start = $8000, size = $2000;
	ROMD08:  start = $0,    size = $2000;
	FIXED:   start = $C000, size = $4000;
}

SEGMENTS {
	AUDIO:     load = ROMA,    type = ro;
	DATA00:    load = ROMD00,  type = ro;
	DATA01:    load = ROMD01,  type = ro;
	DATA02:    load = ROMD02,  type = ro;
	DATA03:    load = ROMD03,  type = ro;
	DATA04:    load = ROMD04,  type = ro;
	DATA05:    load = ROMD05,  type = ro;
	DATA06:    load = ROMD06,  type = ro;
	DATA07:    load = ROMD07,  type = ro;
	DATA08:    load = ROMD08,  type = ro;
	GFX00:     load = ROMG00,  type = ro;
	GFX01:     load = ROMG01,  type = ro;
	GFX02:     load = ROMG02,  type = ro;
	GFX03:     load = ROMG03,  type = ro;
	HEADER:    load = ROMH,    type = ro;
	HOME:      load = FIXED,   type = ro;
	MAIN00:    load = ROMM00,  type = ro;
	MAIN01:    load = ROMM01,  type = ro;
	MAIN02:    load = ROMM02,  type = ro;
	MAIN03:    load = ROMM03,  type = ro;
	MAIN04:    load = ROMM04,  type = ro;
	MAIN05:    load = ROMM05,  type = ro;
	MAIN06:    load = ROMM06,  type = ro;
	MAIN07:    load = ROMM07,  type = ro;
	STAGE_C00: load = ROMC00,  type = ro;
	STAGE_C01: load = ROMC01,  type = ro;
